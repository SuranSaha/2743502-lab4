<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Explorer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Country Explorer</h1>
    </header>

    <main>
        <!-- Search Section -->
        <div class="search-container">
            <input type="text" id="country-input" placeholder="Enter country name...">
            <button id="search-btn">Search</button>
        </div>

        <!-- Loading Spinner (initially hidden) -->
        <div id="loading-spinner" class="spinner hidden"></div>

        <!-- Country Information Section -->
        <section id="country-info" class="country-card">
            <!-- This will be populated by JavaScript -->
        </section>

        <!-- Bordering Countries Section -->
        <section id="bordering-countries" class="border-grid">
            <!-- This will be populated by JavaScript -->
        </section>

        <!-- Error Message Section (initially hidden) -->
        <div id="error-message" class="error hidden"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
